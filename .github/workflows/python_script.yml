name: Run Scripts Every 5 Hours

on:
  schedule:
    - cron: "0 */5 * * *"   # every 3 hours
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Run scripts (5hr)
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          NEW: ${{ secrets.NEW }}
        run: |
          # python monaca.py
          # python nse.py
          python sector.py
         # python sheshaview.py
